<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Untuk Kamu Sayang 🎀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-pink:#F98B88;
    --border-bisque:#F2D2BD;
    --cream:#FFF7F1;
    --deep-rose:#B5453F;
    --deep-rose-2:#9C3A35;
    --ink:#5A2A26;
    --soft-white:#FFFDFC;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0;
    padding:0;
    height:100%;
    background:#3d1613;
    font-family:'Poppins', sans-serif;
    overflow:hidden;
  }

  #stage{
    position:relative;
    width:100vw;
    height:100vh;
    max-width:calc(100vh * 9 / 16);
    max-height:100vh;
    margin:0 auto;
    overflow:hidden;
    background:var(--bg-pink);
    box-shadow:0 0 60px rgba(0,0,0,0.45);
  }

  @media (min-aspect-ratio: 9/16){
    #stage{ width:calc(100vh * 9 / 16); height:100vh; }
  }
  @media (max-aspect-ratio: 9/16){
    #stage{ width:100vw; height:calc(100vw * 16 / 9); }
  }

  .slide{
    position:absolute;
    inset:0;
    background:var(--bg-pink);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:4vh 6% 3vh;
    transform:translateX(0);
    transition:transform .6s cubic-bezier(.65,0,.35,1), opacity .5s ease;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
  }

  #slide2{
    transform:translateX(100%);
  }

  #stage.unlocked #slide1{ transform:translateX(-100%); }
  #stage.unlocked #slide2{ transform:translateX(0); }

  /* decorative baby-breath dots */
  .bg-dot{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
    pointer-events:none;
  }

  .headline{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    color:var(--soft-white);
    text-align:center;
    font-size:clamp(15px, 4.1vh, 23px);
    line-height:1.3;
    letter-spacing:.2px;
    text-shadow:0 2px 0 rgba(181,69,63,0.35);
    margin:0 0 2.2vh;
    max-width:94%;
    flex-shrink:0;
  }

  .sticker-slot{
    width:56%;
    height:16vh;
    max-height:150px;
    border:2.5px dashed rgba(255,255,255,0.85);
    border-radius:24px;
    background:rgba(255,255,255,0.10);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:4px;
    margin-bottom:2.2vh;
    flex-shrink:0;
  }
  .sticker-slot .icon{ font-size:clamp(22px, 5.5vh, 40px); opacity:.9; }
  .sticker-slot .hint{
    font-family:'Poppins', sans-serif;
    font-size:clamp(10px, 2.1vh, 13px);
    color:var(--soft-white);
    opacity:.85;
    text-align:center;
    padding:0 10%;
  }

  /* ===== Passcode panel (slide 1) ===== */
  .panel{
    width:100%;
    max-width:340px;
    background:var(--border-bisque);
    border-radius:26px;
    padding:2.6vh 5% 2.6vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    box-shadow:0 10px 25px rgba(90,42,38,0.18);
    flex-shrink:0;
  }

  .code-display{
    display:flex;
    gap:2.6%;
    margin-bottom:1.8vh;
  }
  .code-dot{
    width:clamp(28px, 5.2vh, 40px);
    height:clamp(28px, 5.2vh, 40px);
    border-radius:50%;
    background:var(--soft-white);
    border:2px solid var(--deep-rose);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(14px, 2.6vh, 20px);
    color:var(--deep-rose);
    transition:transform .15s ease;
  }
  .code-dot.filled{ background:var(--deep-rose); color:var(--soft-white); }
  .code-display.shake{ animation:shake .45s ease; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px); }
    40%{ transform:translateX(8px); }
    60%{ transform:translateX(-6px); }
    80%{ transform:translateX(6px); }
  }

  .keypad{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:1.6vh 4%;
    width:100%;
  }
  .key{
    height:clamp(42px, 7vh, 56px);
    aspect-ratio:1/1;
    border-radius:50%;
    border:none;
    background:var(--soft-white);
    color:var(--deep-rose);
    font-family:'Baloo 2', sans-serif;
    font-size:clamp(16px, 3vh, 22px);
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 0 rgba(181,69,63,0.25);
    transition:transform .08s ease, box-shadow .08s ease;
    margin:0 auto;
  }
  .key:active{
    transform:translateY(3px);
    box-shadow:0 1px 0 rgba(181,69,63,0.25);
  }
  .key.wide{
    background:transparent;
    box-shadow:none;
    color:var(--deep-rose-2);
    font-size:clamp(11px, 2vh, 14px);
    font-family:'Poppins', sans-serif;
    font-weight:600;
  }

  /* ===== Slide 2 ===== */
  .question{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    color:var(--deep-rose);
    text-align:center;
    font-size:clamp(16px, 3.6vh, 24px);
    margin:0 0 2.4vh;
    flex-shrink:0;
  }
  .choices{
    display:flex;
    gap:6%;
    position:relative;
    width:100%;
    justify-content:center;
    min-height:9vh;
    flex-shrink:0;
  }
  .choice-btn{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:clamp(14px, 3vh, 19px);
    padding:2.2vh 7%;
    border-radius:50px;
    border:none;
    cursor:pointer;
    transition:transform .18s ease;
    height:fit-content;
  }
  #btn-yes{
    background:var(--soft-white);
    color:var(--deep-rose);
    box-shadow:0 4px 0 rgba(181,69,63,0.3);
  }
  #btn-yes:active{ transform:scale(.95); }
  #btn-no{
    background:transparent;
    color:var(--soft-white);
    border:2.5px solid var(--soft-white);
    position:relative;
  }

  .result-msg{
    font-family:'Baloo 2', sans-serif;
    font-size:clamp(13px, 2.8vh, 18px);
    color:var(--deep-rose);
    text-align:center;
    margin-top:2vh;
    min-height:3vh;
  }

  .hearts-burst{
    position:absolute;
    font-size:8vw;
    pointer-events:none;
    animation:floatUp 1.1s ease-out forwards;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) scale(0.6); opacity:1; }
    100%{ transform:translateY(-90px) scale(1.3); opacity:0; }
  }
</style>
</head>
<body>

<div id="stage">

  <!-- ================= SLIDE 1 : PASSCODE ================= -->
  <div class="slide" id="slide1">

    <div class="headline">💕Haii sayaaang💕<br>masukkan kode nya sesuai tgl lahir mu yaahh🔐</div>

    <!-- ================================================
         TEMPAT STIKER 1 — ganti div ini dengan gambar/stiker
         bergerak kamu (misalnya <img src="stiker.gif">)
         ================================================ -->
    <div>
      <div class="icon"></div>
      <div class="hint"><img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExbXZtbDVicTNtZWNqNzQ1NndlejM4Zm9rc3A1Z2F1N2txY3gwM3V6MSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/BQOpUKLcHhvQ6okAin/giphy.gif"></div>
    </div>

    <div class="panel">
      <div class="code-display" id="codeDisplay">
        <div class="code-dot"></div>
        <div class="code-dot"></div>
        <div class="code-dot"></div>
        <div class="code-dot"></div>
        <div class="code-dot"></div>
        <div class="code-dot"></div>
      </div>

      <div class="keypad" id="keypad">
        <button class="key" data-num="1">1</button>
        <button class="key" data-num="2">2</button>
        <button class="key" data-num="3">3</button>
        <button class="key" data-num="4">4</button>
        <button class="key" data-num="5">5</button>
        <button class="key" data-num="6">6</button>
        <button class="key" data-num="7">7</button>
        <button class="key" data-num="8">8</button>
        <button class="key" data-num="9">9</button>
        <button class="key wide" id="clearBtn">hapus</button>
        <button class="key" data-num="0">0</button>
        <button class="key wide" id="backBtn">⌫</button>
      </div>
    </div>
  </div>

  <!-- ================= SLIDE 2 : PERTANYAAN ================= -->
  <div class="slide" id="slide2">

    <div class="headline" style="margin-bottom:2vh;">Yeayy berhasil masuk~ 💕</div>

    <!-- ================================================
         TEMPAT STIKER 2 — ganti div ini dengan gambar/stiker
         bergerak kamu (misalnya <img src="stiker2.gif">)
         ================================================ -->
    <div class="panel" style="background:var(--border-bisque);">
      <div 
        <div class="icon"></div>
        <div class="hint"><img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExbHg4MTM4YmI2bnNyajdtOGczOGYzZG5kbDNwbzMzM2dxOGtnMXk0MyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/DtBNH0a2VNWmHsbQoX/giphy.gif"></div>
      </div>

      <div class="question">kamu sayang aku ngga?💕</div>

      <div class="choices" id="choices">
        <button class="choice-btn" id="btn-yes">iya💕</button>
        <button class="choice-btn" id="btn-no">engga❌</button>
      </div>

      <div class="result-msg" id="resultMsg"></div>
    </div>
  </div>

</div>

<script>
  const CORRECT_CODE = "050706";
  let entered = "";
  const stage = document.getElementById('stage');
  const codeDisplay = document.getElementById('codeDisplay');
  const dots = document.querySelectorAll('.code-dot');

  function renderDots(){
    dots.forEach((d, i) => {
      if(i < entered.length){
        d.textContent = entered[i];
        d.classList.add('filled');
      } else {
        d.textContent = "";
        d.classList.remove('filled');
      }
    });
  }

  function checkCode(){
    if(entered.length === CORRECT_CODE.length){
      if(entered === CORRECT_CODE){
        setTimeout(() => { stage.classList.add('unlocked'); }, 250);
      } else {
        codeDisplay.classList.add('shake');
        setTimeout(() => {
          codeDisplay.classList.remove('shake');
          entered = "";
          renderDots();
        }, 500);
      }
    }
  }

  document.querySelectorAll('.key[data-num]').forEach(btn => {
    btn.addEventListener('click', () => {
      if(entered.length < CORRECT_CODE.length){
        entered += btn.dataset.num;
        renderDots();
        checkCode();
      }
    });
  });

  document.getElementById('backBtn').addEventListener('click', () => {
    entered = entered.slice(0, -1);
    renderDots();
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    entered = "";
    renderDots();
  });

  /* ===== Slide 2 interactions ===== */
  const btnYes = document.getElementById('btn-yes');
  const btnNo = document.getElementById('btn-no');
  const resultMsg = document.getElementById('resultMsg');
  const choices = document.getElementById('choices');

  btnYes.addEventListener('click', (e) => {
    resultMsg.textContent = "yeayy makasih sayaaang 🥰💗";
    for(let i=0;i<5;i++){
      const h = document.createElement('div');
      h.className = 'hearts-burst';
      h.textContent = '💗';
      h.style.left = (40 + Math.random()*20) + '%';
      h.style.bottom = '10%';
      choices.appendChild(h);
      setTimeout(() => h.remove(), 1100);
    }
  });

  function dodge(){
    const maxX = choices.clientWidth - btnNo.offsetWidth - 10;
    const maxY = 40;
    const x = (Math.random() * maxX) - (maxX/2);
    const y = (Math.random() * maxY) - (maxY/2);
    btnNo.style.transform = `translate(${x}px, ${y}px)`;
    resultMsg.textContent = "yang bener ih pencet nya 😤";
  }
  btnNo.addEventListener('mouseenter', dodge);
  btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); dodge(); }, {passive:false});
  btnNo.addEventListener('click', (e) => { e.preventDefault(); dodge(); });

  renderDots();
</script>

</body>
</html>
